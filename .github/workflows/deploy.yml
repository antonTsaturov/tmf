name: Deploy eTMF

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm run test --if-present

      - name: 🐳 Build Docker image
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          APP_VERSION="ver. ${PKG_VERSION}.${COMMIT_COUNT}+${SHORT_SHA}"
          echo "Building version: $APP_VERSION"
          docker build --no-cache --build-arg APP_VERSION="$APP_VERSION" -t exploretmf .

      - name: 🏷 Tag image
        run: docker tag exploretmf ghcr.io/antontsaturov/exploretmf:latest

      - name: 🔐 Login to GitHub Container Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ghcr.io -u antontsaturov --password-stdin

      - name: 📤 Push image
        run: docker push ghcr.io/antontsaturov/exploretmf:latest

      - name: 🚀 Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 31.169.124.166
          username: anton
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ghcr.io -u antontsaturov --password-stdin

            # Сохраняем текущую версию как previous перед обновлением
            docker tag ghcr.io/antontsaturov/exploretmf:latest ghcr.io/antontsaturov/exploretmf:previous 2>/dev/null || true            
            
            docker pull ghcr.io/antontsaturov/exploretmf:latest
            
            # Создаем директорию для скриптов
            mkdir -p /home/anton/.exploretmf

            # ОЧИЩАЕМ старые скрипты (опционально)
            # rm -rf /home/anton/.exploretmf/*            
            
            # Временный контейнер для извлечения скриптов
            docker create --name tmf-temp ghcr.io/antontsaturov/exploretmf:latest

            # Копируем скрипты из контейнера на хост
            docker cp tmf-temp:/app/scripts/. /home/anton/.exploretmf/ 2>/dev/null || \
            echo "⚠️ Директория со скриптами не найдена"

            # Удаляем временный контейнер
            docker rm tmf-temp

            # Делаем все скрипты исполняемыми
            chmod +x /home/anton/.exploretmf/*.sh
            
            # Копируем .env файл в директорию скриптов (если нужно)
            cp /home/anton/.env /home/anton/.exploretmf/.env 2>/dev/null || true
            
            # Останавливаем и удаляем старый контейнер
            docker stop exploretmf || true
            docker rm exploretmf || true
            
            # Запускаем новый контейнер
            docker run -d \
              --name exploretmf \
              --restart always \
              -p 127.0.0.1:3000:3000 \
              -v /home/anton/.exploretmf/ya_cloud-iam_key.json:/app/ya_cloud-iam_key.json:ro \
              --env-file /home/anton/.exploretmf/.env \
              ghcr.io/antontsaturov/exploretmf:latest            