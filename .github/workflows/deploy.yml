name: Deploy eTMF

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm run test --if-present

      - name: 🏗 Build app
        run: npm run build

      - name: 🐳 Build Docker image
        run: docker build -t tmf-app .

      - name: 🏷 Tag image
        run: docker tag tmf-app ghcr.io/antontsaturov/tmf-app:latest

      - name: 🔐 Login to GitHub Container Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ghcr.io -u antontsaturov --password-stdin

      - name: 📤 Push image
        run: docker push ghcr.io/antontsaturov/tmf-app:latest

      - name: 🚀 Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 31.169.124.166
          username: anton
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ghcr.io -u antontsaturov --password-stdin

            # Сохраняем текущую версию как previous перед обновлением
            docker tag ghcr.io/antontsaturov/tmf-app:latest ghcr.io/antontsaturov/tmf-app:previous 2>/dev/null || true            
            
            docker pull ghcr.io/antontsaturov/tmf-app:latest
            
            # Создаем директорию для скриптов
            mkdir -p /home/anton/scripts

            # ОЧИЩАЕМ старые скрипты (опционально)
            # rm -rf /home/anton/scripts/*            
            
            # Временный контейнер для извлечения скриптов
            docker create --name tmf-temp ghcr.io/antontsaturov/tmf-app:latest
            
            # Копируем скрипты из контейнера на хост
            # Путь внутри контейнера зависит от вашей структуры
            docker cp tmf-temp:/app/src/scripts/. /home/anton/scripts/ 2>/dev/null || \
            docker cp tmf-temp:/src/scripts/. /home/anton/scripts/ 2>/dev/null || \
            docker cp tmf-temp:/scripts/. /home/anton/scripts/ 2>/dev/null || \
            echo "⚠️ Директория со скриптами не найдена"
            
            # Удаляем временный контейнер
            docker rm tmf-temp
            
            # Делаем все скрипты исполняемыми
            chmod +x /home/anton/scripts/*.sh
            
            # Копируем .env файл в директорию скриптов (если нужно)
            cp /home/anton/.env /home/anton/scripts/.env 2>/dev/null || true
            
            # Останавливаем и удаляем старый контейнер
            docker stop tmf-app || true
            docker rm tmf-app || true
            
            # Запускаем новый контейнер
            docker run -d \
              --name tmf-app \
              --restart always \
              -p 127.0.0.1:3000:3000 \
              --env-file /home/anton/.env \
              ghcr.io/antontsaturov/tmf-app:latest            